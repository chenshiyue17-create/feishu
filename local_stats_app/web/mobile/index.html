<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>XHS Mobile Rankings</title>
    <link rel="stylesheet" href="./styles.css?v=26.4.1-v1" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-main">
          <p class="eyebrow">手机版榜单</p>
          <h1 id="pageTitle">项目排行榜</h1>
          <p id="versionChip" class="version-chip">-</p>
          <p id="pageSummary" class="summary">加载中</p>
          <div class="hero-live-row">
            <span class="hero-live-label">服务器时间</span>
            <span id="headlineServerTime" class="hero-live-value">-</span>
          </div>
        </div>
        <div class="hero-actions">
          <label class="project-picker">
            <span>项目</span>
            <select id="projectSelect"></select>
          </label>
          <label class="project-picker">
            <span>账号</span>
            <select id="accountSelect">
              <option value="all">全部账号</option>
            </select>
          </label>
          <button id="refreshButton" class="refresh-button" type="button">刷新</button>
          <button id="exportLongImageButton" class="refresh-button export-button" type="button">导出长图</button>
        </div>
      </header>

      <section id="historySection" class="ranking-section">
        <div class="section-header">
          <div class="section-heading-stack">
            <h2 id="historyDetailTitle">当天排行榜</h2>
          </div>
          <div class="history-toolbar">
            <label class="history-date-picker" for="calendarDateSelect">
              <select id="calendarDateSelect" class="calendar-date-select"></select>
            </label>
          </div>
        </div>
        <div id="historyDetailSummary" class="status-card history-summary">点历史日历中的某一天，查看当天榜单</div>
        <div class="history-detail-grid">
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>点赞榜</h3>
              <span id="historyLikesCount" class="count-badge">0</span>
            </div>
            <div id="historyLikesList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>评论榜</h3>
              <span id="historyCommentsCount" class="count-badge">0</span>
            </div>
            <div id="historyCommentsList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>互动增长榜</h3>
              <span id="historyGrowthCount" class="count-badge">0</span>
            </div>
            <div id="historyGrowthList" class="ranking-list"></div>
          </div>
        </div>
      </section>

      <section id="statusCard" class="status-card footer-note"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="./app.js?v=26.4.1-v1"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>XHS Mobile Rankings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="hero-main">
          <p class="eyebrow">手机版榜单</p>
          <h1 id="pageTitle">项目排行榜</h1>
          <p id="versionChip" class="version-chip">XHS-26.3.31-V2</p>
          <p id="pageSummary" class="summary">加载中</p>
        </div>
        <div class="hero-actions">
          <label class="project-picker">
            <span>项目</span>
            <select id="projectSelect"></select>
          </label>
          <label class="project-picker">
            <span>账号</span>
            <select id="accountSelect">
              <option value="all">全部账号</option>
            </select>
          </label>
          <button id="refreshButton" class="refresh-button" type="button">刷新</button>
          <button id="exportLongImageButton" class="refresh-button export-button" type="button">导出长图</button>
        </div>
      </header>

      <section class="headline-board">
        <div class="headline-side headline-side--single">
          <div class="headline-side-label">服务器时间</div>
          <div id="headlineServerTime" class="headline-side-value">-</div>
        </div>
      </section>

      <section id="statusCard" class="status-card"></section>

      <section class="ranking-section">
        <div class="section-header">
          <h2>日期选择</h2>
          <span id="calendarCount" class="count-badge">0</span>
        </div>
        <details class="calendar-picker-shell">
          <summary class="calendar-picker-summary">
            <span>选择日期</span>
            <span id="calendarSelectedDate" class="calendar-selected-date">-</span>
          </summary>
          <div class="calendar-picker-body">
            <label class="calendar-picker-label" for="calendarDateSelect">历史日期</label>
            <select id="calendarDateSelect" class="calendar-date-select"></select>
          </div>
        </details>
      </section>

      <section class="ranking-section">
        <div class="section-header">
          <h2 id="historyDetailTitle">当天排行榜</h2>
          <span id="historyDetailDate" class="count-badge">-</span>
        </div>
        <div id="historyDetailSummary" class="status-card history-summary">点历史日历中的某一天，查看当天榜单</div>
        <div class="history-detail-grid">
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>当天点赞榜</h3>
              <span id="historyLikesCount" class="count-badge">0</span>
            </div>
            <div id="historyLikesList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>当天评论榜</h3>
              <span id="historyCommentsCount" class="count-badge">0</span>
            </div>
            <div id="historyCommentsList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>当天互动增长榜</h3>
              <span id="historyGrowthCount" class="count-badge">0</span>
            </div>
            <div id="historyGrowthList" class="ranking-list"></div>
          </div>
        </div>
      </section>

      <section class="ranking-section">
        <div class="section-header">
          <h2 id="accountDetailTitle">账号内榜单</h2>
          <span id="accountDetailBadge" class="count-badge">全部</span>
        </div>
        <div id="accountDetailSummary" class="status-card history-summary">选择一个账号，查看账号内榜单</div>
        <div class="history-detail-grid">
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>账号点赞榜</h3>
              <span id="accountLikesCount" class="count-badge">0</span>
            </div>
            <div id="accountLikesList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>账号评论榜</h3>
              <span id="accountCommentsCount" class="count-badge">0</span>
            </div>
            <div id="accountCommentsList" class="ranking-list"></div>
          </div>
          <div class="history-detail-block">
            <div class="section-header compact">
              <h3>账号互动增长榜</h3>
              <span id="accountGrowthCount" class="count-badge">0</span>
            </div>
            <div id="accountGrowthList" class="ranking-list"></div>
          </div>
        </div>
      </section>

      <section class="ranking-section">
        <div class="section-header">
          <h2>今日点赞榜</h2>
          <span id="likesCount" class="count-badge">0</span>
        </div>
        <div id="likesList" class="ranking-list"></div>
      </section>

      <section class="ranking-section">
        <div class="section-header">
          <h2>今日评论榜</h2>
          <span id="commentsCount" class="count-badge">0</span>
        </div>
        <div id="commentsList" class="ranking-list"></div>
      </section>

      <section class="ranking-section">
        <div class="section-header">
          <h2>每日互动增长榜</h2>
          <span id="growthCount" class="count-badge">0</span>
        </div>
        <div id="growthList" class="ranking-list"></div>
      </section>
    </main>

    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
